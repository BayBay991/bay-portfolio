<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Clawy</title> 
    <!-- Google Fonts: Playfair Display for headings, Open Sans for body text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <style>
        /* --- Global Styles --- */
        body {
            font-family: 'Open Sans', sans-serif; 
            background-color: #efece3; 
            color: #2b59a2; 
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden; /* Mencegah scroll horizontal */
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif; 
            color: #2b59a2; 
        }

        a {
            color: #e3ad48; 
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #f0c471; 
        }
        /* --- Navbar Styles --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: rgba(43, 89, 162, 0.8); /* Biru tua semi-transparan */
            color: #efece3;
            position: sticky; /* Agar navbar tetap di atas */
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background-color 0.3s ease; /* Transisi halus saat scroll */
        }
        .navbar.scrolled {
            background-color: rgba(43, 89, 162, 0.95); /* Latar lebih solid saat di-scroll */
        }
        .navbar .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            font-weight: bold;
            color: #e3ad48; /* Aksen warna pada logo */
        }
        .navbar .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }
        .navbar .nav-links li {
            margin-left: 30px;
        }
        .navbar .nav-links a {
            color: #efece3; /* Warna link navigasi */
            font-weight: bold;
            font-size: 1.1em;
            padding: 5px 0;
            position: relative;
        }
        .navbar .nav-links a::after { /* Underline effect */
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #e3ad48;
            transition: width 0.3s ease;
        }
        .navbar .nav-links a:hover::after {
            width: 100%;
        }

        /* --- Mobile Menu --- */
        .menu-toggle {
            display: none; /* Sembunyikan di desktop */
            background: none;
            border: none;
            color: #efece3;
            font-size: 2em;
            cursor: pointer;
        }
        .mobile-nav {
            display: none; /* Sembunyikan secara default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(43, 89, 162, 0.95); /* Background semi-transparan */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            transform: translateX(-100%); /* Mulai dari luar layar */
            transition: transform 0.3s ease-in-out;
        }
        .mobile-nav.active {
            transform: translateX(0); /* Tampilkan saat aktif */
        }
        .mobile-nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: center;
        }
        .mobile-nav li {
            margin-bottom: 30px;
        }
        .mobile-nav a {
            color: #efece3;
            font-size: 1.8em;
            font-weight: bold;
        }
        .mobile-nav .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #efece3;
            font-size: 2.5em;
            cursor: pointer;
        }
        /* --- Hero Section --- */
        .hero-section {
            background-color: #2b59a2; /* Default background */
            color: #efece3; 
            padding: 120px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            position: relative; 
            overflow: hidden; 
            opacity: 0; /* Mulai tersembunyi untuk animasi */
            transform: translateY(50px); /* Mulai dari bawah */
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .hero-section.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .hero-section h1 {
            font-size: 4em; 
            margin-bottom: 15px;
            color: #e3ad48; 
            letter-spacing: 1px;
        }
        .hero-section p {
            font-size: 1.6em; 
            margin-bottom: 40px;
            font-style: italic; 
        }
        .hero-section .cta-button {
            background-color: #e3ad48; 
            color: #2b59a2; 
            padding: 15px 35px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 8px; 
            transition: background-color 0.3s ease, transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .hero-section .cta-button:hover {
            background-color: #f0c471; 
            transform: translateY(-3px);
        }

        /* --- About Section --- */
        .about-section {
            padding: 100px 20px;
            text-align: center;
            background-color: #fff; /* Latar belakang putih untuk kontras */
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .about-section.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .about-section h2 {
            font-size: 3em;
            margin-bottom: 40px;
            color: #e3ad48; /* Aksen warna oranye */
        }

        .about-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px; /* Jarak antara gambar dan teks */
            max-width: 1100px;
            margin: 0 auto;
            text-align: left; /* Teks rata kiri agar lebih rapi */
        }

        .about-image {
            flex-basis: 40%; /* Lebar foto profil */
            max-width: 400px; /* Ukuran maksimum foto */
            border-radius: 15px; /* Sudut sedikit melengkung */
            overflow: hidden; /* Agar gambar sesuai dengan border radius */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .about-image img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 15px; /* Pastikan gambar juga melengkung */
        }

        .about-text {
            flex-basis: 60%; /* Lebar area teks */
        }

        .about-text p {
            font-size: 1.2em; 
            line-height: 1.8; 
            color: #555; 
        }

        /* --- Skills Section --- */
        .skills-section {
            padding: 100px 20px;
            background-color: #fff; 
            text-align: center;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .skills-section.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .skills-section h2 {
            font-size: 3em;
            margin-bottom: 60px;
            color: #e3ad48; 
        }
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px; 
            max-width: 1000px;
            margin: 0 auto;
        }

        .skill-category {
            background-color: #f8f8f8; 
            border-radius: 10px;
            padding: 30px;
            flex: 1; 
            min-width: 280px; 
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .skill-category:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .skill-category h3 {
            font-size: 2em;
            margin-bottom: 25px;
            color: #2b59a2; 
        }
        .skill-category ul {
            list-style: none;
            padding: 0;
            text-align: left; 
        }

        .skill-category li {
            margin-bottom: 15px;
            font-size: 1.1em;
            color: #555; 
            display: flex;
            align-items: center; 
        }
        .skill-icon {
            margin-right: 15px;
            font-size: 1.4em; 
            color: #e3ad48; 
        }

        /* --- Portfolio Section (Masonry Layout) --- */
        .portfolio-section {
            padding: 100px 20px;
            background-color: #efece3; 
            text-align: center;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .portfolio-section.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .portfolio-section h2 {
            font-size: 3em;
            margin-bottom: 60px;
            color: #2b59a2; 
        }

        .portfolio-grid {
            column-count: 3; /* Memulai masonry layout */
            column-gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .portfolio-item {
            background-color: #fff; 
            border-radius: 10px;
            overflow: hidden; 
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-bottom: 20px; /* Jarak antar item dalam kolom */
            display: inline-block; /* Penting untuk masonry */
            width: 100%; /* Agar item mengisi lebar kolom */
        }

        .portfolio-item:hover {
            transform: translateY(-7px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
        }

        .portfolio-item img {
            width: 100%;
            height: auto; /* Tinggi menyesuaikan proporsi gambar */
            display: block; 
        }

        .portfolio-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            min-height: 150px; /* Tinggi minimum untuk info */
        }

        .portfolio-info h3 {
            font-size: 1.6em;
            margin-bottom: 8px;
            color: #2b59a2; 
        }

        .portfolio-info p {
            font-size: 0.95em;
            color: #777; 
            margin-bottom: 15px;
            font-style: italic;
        }
        .details-button {
            background-color: #e3ad48; 
            color: #2b59a2; 
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s ease;
            align-self: center; 
            margin-top: auto; 
        }

        .details-button:hover {
            background-color: #f0c471; 
        }
        /* --- Social Media Links --- */
        .social-media-links {
            margin-top: 40px;
            padding: 20px;
            background-color: #2b59a2; 
            color: #efece3; 
            text-align: center;
        }
        .social-media-links h3 {
            margin-bottom: 20px;
            color: #e3ad48; 
            font-size: 1.8em;
        }

            list-
